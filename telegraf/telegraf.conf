[agent]
  interval = "10s"
  flush_interval = "10s"
  debug = true
  quiet = false

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "snoopy/sensor/temperatura/state",
    "snoopy/sensor/pressione/state",
    "snoopy/sensor/umidita/state",
    "snoopy/sensor/resistenza_gas/state"
  ]
  data_format = "value"
  data_type = "float"
  name_override = "aria"

  ## Estrae il nome del sensore dal topic
  ## es. "snoopy/sensor/temperatura/state" → tag sensor="temperatura"
  ## Le label sono posizionali sui segmenti del topic: il nome del sensore
  ## è il 3° segmento, quindi "_/_/sensor/_" (NON "_/sensor/..." che cattura
  ## la stringa fissa "sensor").
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "snoopy/sensor/+/state"
    tags  = "_/_/sensor/_"

# Segnale WiFi del Naso (RSSI in dBm) — wifi_signal sensor ESPHome, ogni 60s.
# Misura separata "wifi" per non mescolarla con "aria".
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "snoopy/sensor/wifi_signal/state"
  ]
  data_format = "value"
  data_type = "float"
  name_override = "wifi"

# A che rete/apparato è agganciato il Naso — wifi_info text_sensor ESPHome.
# NB: ESPHome pubblica i text_sensor sotto "snoopy/sensor/..." (NON
# "text_sensor"). Stringhe (SSID + BSSID), quindi consumer separato
# data_type="string" e misura a parte "wifi_net" (la stringa collide col
# campo float di "wifi"). tag field=wifi_ssid|wifi_bssid per i due valori.
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "snoopy/sensor/wifi_ssid/state",
    "snoopy/sensor/wifi_bssid/state"
  ]
  data_format = "value"
  data_type = "string"
  name_override = "wifi_net"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "snoopy/sensor/+/state"
    tags  = "_/_/field/_"

# Howl RSSI scout — telemetria dai 3 ESP per identificare il vincitore al punto cisterna.
# Topic: snoopy/howl-test/howl-rssi-<a|b|c>/sensor/rssi/state  (valore float in dBm)
# Tag estratti: node=howl-rssi-<x>, metric=rssi.
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "snoopy/howl-test/+/sensor/rssi/state"
  ]
  data_format = "value"
  data_type = "float"
  name_override = "howl_rssi"

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "snoopy/howl-test/+/sensor/+/state"
    tags  = "_/_/node/_/metric/_"

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "${INFLUX_TOKEN}"
  organization = "snoopy-lab"
  bucket = "aria"
