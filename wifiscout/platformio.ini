; Snoopy WiFi Scout — sonda diagnostica su ESP B (WROOM-32, CH340 → /dev/ttyUSB0)
; Scan passivo di tutte le reti viste + sonda attiva di aggancio al repeater.
; Build/flash via immagine esphome (contiene PlatformIO 6.1.19).
; NB: il volume pio_cache e' condiviso con esphome e ha librerie async (RPAsyncTCP)
; nella storage globale che inquinano il LDF e fanno fallire il build su ESP32
; ("ip_addr_t has no member 'addr'"). Si neutralizza puntando la globallib a una
; dir vuota -> si riusa il toolchain ma si ignorano quelle librerie:
;   docker run --rm --device=/dev/ttyUSB0 \
;     -v /home/mak/wifiscout:/project -w /project -v pio_cache:/root/.platformio \
;     -e PLATFORMIO_GLOBALLIB_DIR=/tmp/pio-empty-lib \
;     --entrypoint pio ghcr.io/esphome/esphome run -t upload

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = /dev/ttyUSB0
upload_speed = 460800
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0
