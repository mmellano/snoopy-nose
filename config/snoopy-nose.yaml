esphome:
  name: snoopy-nose
  friendly_name: Snoopy Nose

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

mqtt:
  broker: 192.168.1.14
  port: 1883
  topic_prefix: snoopy
  keepalive: 60s
  reboot_timeout: 15min

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
    - ssid: !secret wifi_ssid_fb
      password: !secret wifi_password_fb
  ap:
    ssid: "Snoopy-Nose Fallback"
    password: !secret ap_password
  reboot_timeout: 15min
  power_save_mode: none

captive_portal:

i2c:
  sda: GPIO21
  scl: GPIO22
  scan: true
  id: bus_a

sensor:
  - platform: bme680
    i2c_id: bus_a
    address: 0x77
    temperature:
      name: "Temperatura"
      oversampling: 4x
    pressure:
      name: "Pressione"
      oversampling: 4x
    humidity:
      name: "Umidita"
      oversampling: 4x
    gas_resistance:
      name: "Resistenza Gas"
    heater:
      temperature: 320
      duration: 150ms
    update_interval: 60s

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s